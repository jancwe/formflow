services:
  formflow-app:
    image: ${FORMFLOW_IMAGE:-formflow:local}
    build: .
    ports:
      - "${APP_HOST_PORT:-8080}:5000"
    env_file:
      - .env
    volumes:
      - ./pdf_output:/app/pdfs:Z
      - ./forms:/app/forms:Z
      - ./formflow/pdf_templates:/app/formflow/pdf_templates:Z
      - ./formflow/static:/app/formflow/static:Z
      - ./drafts:/app/drafts:Z
    restart: unless-stopped
    depends_on:
      smb-server:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5000/"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 5s

  smb-server:
    image: dperson/samba
    environment:
      - USERID=0
      - GROUPID=0
      - USER=testuser;testpass
      - SHARE=pdfs;/share;yes;no;yes;testuser
    volumes:
      - ./smb_data:/share:Z
    restart: unless-stopped

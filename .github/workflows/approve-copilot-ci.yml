name: Auto-approve Copilot CI

on:
  pull_request_target:
    branches:
      - main
      - smb-server

permissions:
  actions: write

jobs:
  approve:
    if: github.event.pull_request.user.login == 'copilot-swe-agent[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Approve pending CI runs
        uses: actions/github-script@v7
        with:
          script: |
            // Wait for CI workflow run to be created
            const maxAttempts = 5;
            const delayMs = 10000;

            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
              const { data: runs } = await github.rest.actions.listWorkflowRunsForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                head_sha: context.payload.pull_request.head.sha,
                status: 'action_required',
              });

              if (runs.workflow_runs.length > 0) {
                for (const run of runs.workflow_runs) {
                  console.log(`Approving workflow run ${run.id} (${run.name})`);
                  await github.rest.actions.approveWorkflowRun({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    run_id: run.id,
                  });
                }
                return;
              }

              if (attempt < maxAttempts) {
                console.log(`Attempt ${attempt}: No pending runs found, waiting ${delayMs / 1000}s...`);
                await new Promise(r => setTimeout(r, delayMs));
              }
            }

            console.log('No workflow runs requiring approval found.');

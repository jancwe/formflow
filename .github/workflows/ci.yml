name: CI

on:
  push:
    branches:
      - smb-server
      - main
  # Damit Copilot-PRs automatisch ohne manuelle Freigabe laufen, muss in den
  # Repository-Settings unter Actions → General die Option
  # "Approval for running fork pull request workflows from contributors"
  # auf "Require approval for first-time contributors who are new to GitHub" gesetzt sein.
  # Copilot muss einmalig manuell freigegeben werden, danach läuft CI automatisch.
  pull_request:
    branches:
      - smb-server
      - main
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  actions: read
  pull-requests: write
  issues: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Install Docker Compose
        run: sudo apt-get update && sudo apt-get install -y docker-compose

      - name: Create .env file for testing
        run: cp .env.example .env

      - name: Start services
        run: docker-compose -f docker-compose.dev.yml up -d

      - name: Wait for services
        run: |
          # Wait for the web server to be ready
          timeout=60
          while ! curl -s http://localhost:8080 > /dev/null; do
            timeout=$((timeout-1))
            if [ $timeout -eq 0 ]; then
              echo "Error: Timed out waiting for web server."
              docker-compose logs
              exit 1
            fi
            sleep 1
          done

      - name: Run tests
        id: tests
        run: python -m pytest

      - name: Show logs on failure
        if: failure() && steps.tests.outcome == 'failure'
        run: docker-compose logs formflow-app

      - name: Tear down services
        if: always()
        run: |
          docker-compose -f docker-compose.dev.yml down
          sudo rm -rf smb_data

      - name: Collect job logs for AI analysis
        id: collect-logs
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { data: jobs } = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });
            const job = jobs.jobs.find(j => j.name === 'test');
            if (!job) { core.setOutput('logs', 'Keine Logs verfügbar.'); return; }
            const logsResponse = await github.rest.actions.downloadJobLogsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              job_id: job.id,
            });
            // Truncate to 8000 chars to stay within AI model context/token limits
            const logs = logsResponse.data.substring(0, 8000);
            core.setOutput('logs', logs);

      - name: AI failure analysis
        id: ai-analysis
        if: failure()
        uses: actions/ai-inference@v1
        with:
          model: gpt-4o-mini
          prompt: |
            Ein CI-Job ist fehlgeschlagen. Hier sind die Logs:

            ${{ steps.collect-logs.outputs.logs }}

            Bitte analysiere die Ursache des Fehlschlags und gib konkrete Lösungsvorschläge auf Deutsch.

      - name: Post AI analysis as PR comment
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          AI_ANALYSIS: ${{ steps.ai-analysis.outputs.response }}
        with:
          script: |
            const analysis = process.env.AI_ANALYSIS || 'Keine Analyse verfügbar.';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🤖 KI-Fehleranalyse\n\n${analysis}`,
            });

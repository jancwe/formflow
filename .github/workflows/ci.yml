name: CI

on:
  push:
    branches:
      - smb-server
      - main
      - develop
  pull_request:
    branches:
      - smb-server
      - main
      - develop
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Create .env file for testing
        run: cp .env.example .env

      - name: Setup forms for testing
        run: cp forms/examples/*.yaml forms/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build formflow image with cache
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: formflow:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start services
        run: docker compose -f docker-compose.dev.yml up -d --wait --wait-timeout 60
        env:
          FORMFLOW_IMAGE: formflow:ci

      - name: Run tests
        id: tests
        run: python -m pytest

      - name: Show logs on failure
        if: failure() && steps.tests.outcome == 'failure'
        run: docker compose -f docker-compose.dev.yml logs formflow-app

      - name: Tear down services
        if: always()
        run: |
          docker compose -f docker-compose.dev.yml down
          sudo rm -rf smb_data

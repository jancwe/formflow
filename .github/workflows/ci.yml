name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements-dev.txt

      - name: Install ruff
        run: pip install "ruff>=0.9.0"

      - name: Ruff – Linting
        run: ruff check .

      - name: Ruff – Format-Check
        run: ruff format --check .

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache virtual environment
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('pyproject.toml', 'src/**/*.py') }}
          restore-keys: |
            venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-

      - name: Install dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install ".[dev]"

      - name: Re-install local package (ensures source changes are picked up)
        if: steps.cache-venv.outputs.cache-hit == 'true'
        run: .venv/bin/pip install --force-reinstall --no-deps ".[dev]"

      - name: Add venv to PATH
        run: echo "${{ github.workspace }}/.venv/bin" >> $GITHUB_PATH

      - name: Create .env file for testing
        run: cp .env.example .env

      - name: Setup forms for testing
        run: cp forms/examples/*.yaml forms/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build formflow image with cache
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: formflow:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start services
        run: docker compose -f docker-compose.dev.yml up -d --wait --wait-timeout 60 --no-build
        env:
          FORMFLOW_IMAGE: formflow:ci

      - name: Run tests
        id: tests
        run: python -m pytest

      - name: Show logs on failure
        if: failure() && steps.tests.outcome == 'failure'
        run: docker compose -f docker-compose.dev.yml logs formflow-app

      - name: Tear down services
        if: always()
        run: |
          docker compose -f docker-compose.dev.yml down
          sudo rm -rf smb_data
